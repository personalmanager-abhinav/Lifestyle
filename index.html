<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lifelog">
<meta name="theme-color" content="#0d2818">
<title>Lifelog</title>
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.json">

<body>

<header>
  <div class="wrap">
    <div class="hrow">
      <div class="brand"><span class="leaf">🌿</span>Lifelog</div>
      <div class="htools">
        <button class="icb" onclick="openWeekly()">Review</button>
        <button class="icb" onclick="openSettings()">Settings</button>
      </div>
    </div>
    <div class="range-bar" id="rangeBar"></div>
  </div>
</header>

<main class="wrap">
  <div class="gauge-card">
    <div class="gt"><b>Today's throttle</b><span id="gaugeDate"></span></div>
    <svg class="gauge-svg" id="gaugeSvg" viewBox="0 0 200 118"></svg>
    <div class="g-word" id="gWord">No data</div>
    <div class="g-hint" id="gHint">Log today to see your throttle</div>
  </div>

  <div class="today-h">
    <h2>Today</h2>
    <span class="date" id="todayDate"></span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="today-h" style="margin-top:26px">
    <h2>Overview</h2>
    <span class="date">all metrics</span>
  </div>
  <div class="chart-wrap" id="ovWrap">
    <div class="chart-top">
      <span style="font-size:12px;color:var(--muted)">metric</span>
      <div class="metric-sel"><select class="mini-sel" id="ovSel" onchange="drawOverview()"></select></div>
    </div>
    <svg class="chart" id="ovSvg" viewBox="0 0 320 150" preserveAspectRatio="none"></svg>
    <div class="cstat" id="ovStat"></div>
  </div>
</main>

<!-- module sheet -->
<div class="sheet" id="sheet">
  <div class="sheet-h">
    <div class="ttl" id="sheetTtl"></div>
    <button class="close" onclick="closeSheet()">✕</button>
  </div>
  <div id="sheetBody"></div>
</div>

<!-- settings sheet -->
<div class="sheet" id="setSheet">
  <div class="sheet-h">
    <div class="ttl">Settings & Data</div>
    <button class="close" onclick="closeSet()">✕</button>
  </div>
  <div id="setBody"></div>
</div>

<!-- weekly sheet -->
<div class="sheet" id="wkSheet">
  <div class="sheet-h">
    <div class="ttl">Weekly review</div>
    <button class="close" onclick="closeWeekly()">✕</button>
  </div>
  <div id="wkBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============ storage ============ */
const KEY="lifelog.v1";
const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
function load(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function save(){DB.settings=DB.settings||{};DB.settings._updated=Date.now();try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){toast("Save failed — storage full?");}if(typeof clearThr==="function")clearThr();schedulePush();}
let _pushT=null;
function schedulePush(){const c=ghCfg();if(!c||!c.token)return;clearTimeout(_pushT);_pushT=setTimeout(()=>ghPush(false),2500);}

/* ============ module definitions ============
   type: number | scale(1-10) | time | bool | text | select
   multi:true  => list of timestamped entries per day (meals, workouts...)
   else single record per date
=================================================*/
const RANGES=[{k:"7d",n:"7d",d:7},{k:"14d",n:"14d",d:14},{k:"30d",n:"30d",d:30},{k:"90d",n:"90d",d:90},{k:"365d",n:"1y",d:365},{k:"all",n:"All",d:99999}];

// nutrition: meal slots + nutrient steppers (daily reference for adult male)
const MEAL_SLOTS=["Breakfast","Lunch","Dinner"];
const NUTRIENTS=[
  {key:"kcal",label:"Calories",unit:"kcal",step:50,goal:2500},
  {key:"protein",label:"Protein",unit:"g",step:5,goal:56},
  {key:"carbs",label:"Carbs",unit:"g",step:10,goal:300},
  {key:"fat",label:"Fat",unit:"g",step:5,goal:78},
  {key:"fiber",label:"Fiber",unit:"g",step:2,goal:38},
];
// micronutrients — just toggle if the meal had a source (hard to quantify)
const MICROS=[
  // vitamins
  "Vit A","Vit B1","Vit B2","Vit B3","Vit B5","Vit B6","Vit B7","Vit B9 (Folate)","Vit B12",
  "Vit C","Vit D","Vit E","Vit K",
  // minerals
  "Calcium","Phosphorus","Magnesium","Potassium","Sodium","Chloride",
  "Iron","Zinc","Copper","Manganese","Iodine","Selenium","Molybdenum","Chromium","Fluoride","Cobalt",
  // fats
  "Omega-3"
];

const MODULES=[
 {id:"sleep",name:"Sleep",ic:"🌙",multi:false,fields:[
   {key:"bed",label:"Slept at",type:"time"},
   {key:"wake",label:"Woke at",type:"time"},
   {key:"hours",label:"Hours slept",type:"number",unit:"h",chart:true},
   {key:"quality",label:"Quality",type:"scale",chart:true},
   {key:"sun",label:"Morning sunlight",type:"bool"},
   {key:"naps",label:"Nap minutes",type:"number",unit:"min",chart:true},
 ]},
 {id:"nutrition",name:"Nutrition",ic:"🍽️",multi:true,fields:[
   {key:"slot",label:"Meal",type:"select",options:["Breakfast","Lunch","Dinner"]},
   {key:"kcal",label:"Calories",type:"number",unit:"kcal",chart:true},
   {key:"protein",label:"Protein",type:"number",unit:"g",chart:true},
   {key:"carbs",label:"Carbs",type:"number",unit:"g",chart:true},
   {key:"fat",label:"Fat",type:"number",unit:"g",chart:true},
   {key:"fiber",label:"Fiber",type:"number",unit:"g",chart:true},
 ],dayField:{key:"water",label:"Water today",type:"number",unit:"L",chart:true}},
 {id:"fitness",name:"Fitness",ic:"💪",multi:true,fields:[
   {key:"type",label:"Type",type:"select",options:["Gym","Run","Walk","Home","Yoga","Sport","Rest"]},
   {key:"mins",label:"Duration",type:"number",unit:"min",chart:true},
   {key:"note",label:"Note",type:"text"},
 ],dayField:{key:"weight",label:"Body weight",type:"number",unit:"kg",chart:true}},
 {id:"research",name:"Research",ic:"🔬",multi:false,fields:[
   {key:"deep",label:"Deep-work hours",type:"number",unit:"h",chart:true},
   {key:"plan",label:"Plan (today)",type:"text"},
   {key:"progress",label:"Progress",type:"text"},
   {key:"problem",label:"Problems",type:"text"},
   {key:"papers",label:"Papers read",type:"number",chart:true},
 ]},
 {id:"study",name:"Study",ic:"📚",multi:false,fields:[
   {key:"topic",label:"Topic",type:"text"},
   {key:"hours",label:"Hours",type:"number",unit:"h",chart:true},
   {key:"roadmap",label:"Roadmap % (agentic AI)",type:"number",unit:"%",chart:true},
   {key:"win",label:"Concept mastered",type:"text"},
 ]},
 {id:"reading",name:"Reading",ic:"📖",multi:true,fields:[
   {key:"book",label:"Book",type:"text"},
   {key:"pages",label:"Pages",type:"number",chart:true},
   {key:"mins",label:"Minutes",type:"number",unit:"min",chart:true},
   {key:"idea",label:"Key idea",type:"text"},
 ]},
 {id:"tutoring",name:"Tutoring",ic:"🧑‍🏫",multi:true,fields:[
   {key:"student",label:"Student",type:"text"},
   {key:"topic",label:"Topic",type:"text"},
   {key:"mins",label:"Duration",type:"number",unit:"min",chart:true},
   {key:"income",label:"Income",type:"number",unit:"₹",chart:true},
 ]},
 {id:"mood",name:"Mood & Energy",ic:"⚡",multi:false,fields:[
   {key:"energy",label:"Energy now",type:"scale",chart:true},
   {key:"mood",label:"Mood",type:"scale",chart:true},
   {key:"focus",label:"Focus quality",type:"scale",chart:true},
   {key:"note",label:"Note",type:"text"},
 ]},
 {id:"habits",name:"Habits",ic:"✅",multi:false,fields:[
   {key:"wake",label:"Hit wake target",type:"bool"},
   {key:"meditate",label:"Meditated",type:"bool"},
   {key:"noscreen",label:"No screen in bed",type:"bool"},
   {key:"sunlight",label:"Morning sunlight",type:"bool"},
 ]},
 {id:"finance",name:"Finance",ic:"💰",multi:true,fields:[
   {key:"item",label:"Item",type:"text"},

 {id:"circadian",name:"Circadian",ic:"🌡️",multi:true,fields:[

   {key:"hr",label:"Resting HR",type:"number",unit:"bpm",chart:true},
   {key:"alert",label:"Alertness",type:"scale",chart:true},
 ]},
 {id:"code",name:"Code & GitHub",ic:"💻",multi:false,fields:[
   {key:"committed",label:"Committed today",type:"bool"},
   {key:"commits",label:"Commits",type:"counter",step:1,chart:true},
   {key:"what",label:"What I built",type:"text"},
 ]},
 {id:"leetcode",name:"LeetCode",ic:"🧩",multi:true,fields:[
   {key:"cat",label:"Category",type:"select",options:["Array","String","Hashing","Two Pointers","Sliding Window","Stack","Queue","Linked List","Tree","BST","Heap","Graph","DP","Greedy","Backtracking","Binary Search","Trie","Bit Manipulation","Math","Matrix","Intervals","Database (SQL)","Design"]},
   {key:"solved",label:"Solved",type:"counter",step:1,chart:true},
   {key:"diff",label:"Difficulty",type:"select",options:["Easy","Medium","Hard","Mixed"]},
 ]},
 {id:"kaggle",name:"Kaggle",ic:"📊",multi:false,fields:[
   {key:"done",label:"Worked on Kaggle",type:"bool"},
   {key:"note",label:"What (comp / dataset)",type:"text"},
 ]},
 {id:"linux",name:"Linux Learning",ic:"🐧",multi:false,fields:[
   {key:"done",label:"Studied Linux",type:"bool"},
   {key:"topic",label:"Topic",type:"text"},
 ]},
 {id:"gate",name:"GATE 2027",ic:"🎯",multi:false,fields:[
   {key:"done",label:"Studied today",type:"bool"},
   {key:"subject",label:"Subject / topic",type:"text"},
 ]},
 {id:"coursera",name:"Coursera",ic:"🎓",multi:false,fields:[
   {key:"done",label:"Progressed today",type:"bool"},
   {key:"course",label:"Course / lesson",type:"text"},
 ]},
 {id:"contacts",name:"Company Contacts",ic:"📇",multi:true,fields:[
   {key:"company",label:"Company",type:"text"},
   {key:"person",label:"Person",type:"text"},
   {key:"role",label:"Role",type:"text"},
   {key:"channel",label:"Channel",type:"select",options:["LinkedIn","Email","Referral","Event","Cold DM","Other"]},
   {key:"note",label:"Note / next step",type:"text"},
 ]},
];
const MOD=Object.fromEntries(MODULES.map(m=>[m.id,m]));

/* ============ default DB (preloaded, editable) ============ */
function freshDB(){
  const db={settings:{globalRange:"30d"},modules:{}};
  MODULES.forEach(m=>{db.modules[m.id]={entries:{},params:[],range:null};});
  // preload context (editable): habits already defined; seed study roadmap & known items as hints via params/notes
  db.modules.study.params=[]; 
  db.modules.research.entries={}; 
  // seed today's research plan hint
  return db;
}
let DB=load()||freshDB();
// ensure schema for any new modules
MODULES.forEach(m=>{if(!DB.modules[m.id])DB.modules[m.id]={entries:{},params:[],range:null};if(!DB.modules[m.id].params)DB.modules[m.id].params=[];});

/* ============ helpers ============ */
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800);}
function allFields(m){return m.fields.concat((DB.modules[m.id].params||[]).map(p=>({...p,custom:true})));}
function globalDays(){const g=DB.settings.globalRange;
  if(g==="all")return 99999;
  if(typeof g==="number")return g;
  const r=RANGES.find(x=>x.k===g);return r?r.d:30;}
function rangeDays(mid){const ov=DB.modules[mid]&&DB.modules[mid].range;
  if(ov){const r=RANGES.find(x=>x.k===ov);return r?r.d:globalDays();}
  return globalDays();}
function datesInRange(days){const out=[];const d=new Date();for(let i=days-1;i>=0;i--){const t=new Date(d);t.setDate(d.getDate()-i);out.push(t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0"));}return out;}
function fmtDate(s){const [y,m,d]=s.split("-");return d+"/"+m;}

/* ============ dawn strip ============ */
function renderDayHeader(){
  const dd=new Date();
  document.getElementById("todayDate").textContent=dd.toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"});
  renderGauge();
}

/* ============ global range bar ============ */
function renderRangeBar(){
  const bar=document.getElementById("rangeBar");
  const isAll=(DB.settings.globalRange==="all");
  const days=isAll?365:globalDays();
  bar.innerHTML=`<div class="range-slider">
      <div class="range-top"><span class="rlbl">Range</span>
        <span id="rangeVal">${isAll?"All time":days+" days"}</span>
        <button class="allbtn${isAll?' on':''}" id="allBtn">All</button></div>
      <input type="range" id="rangeSlider" min="7" max="365" step="1" value="${days}"${isAll?' disabled':''} aria-label="Time range">
    </div>`;
  const sl=document.getElementById("rangeSlider");
  const val=document.getElementById("rangeVal");
  const allBtn=document.getElementById("allBtn");
  sl.oninput=()=>{const d=+sl.value;DB.settings.globalRange=d;save();
    val.textContent=d+" days";renderGrid();};
  allBtn.onclick=()=>{const on=allBtn.classList.toggle("on");
    if(on){DB.settings.globalRange="all";val.textContent="All time";sl.disabled=true;}
    else{DB.settings.globalRange=+sl.value;val.textContent=sl.value+" days";sl.disabled=false;}
    save();renderGrid();};
}

/* ============ grid / today cards ============ */
function moduleSummary(m){
  const t=todayStr();const md=DB.modules[m.id];
  if(m.multi){
    const list=(md.entries[t]||[]);
    let done=list.length>0;let big="",st="";
    if(m.id==="fitness"){const mins=list.reduce((a,e)=>a+(+e.mins||0),0);big=mins?mins+'<small> min</small>':"";st=list.length?list.length+" session"+(list.length>1?"s":""):"tap to log";}
    else if(m.id==="nutrition"){big=list.length?list.length+'<small> meals</small>':"";const w=(md.dayEntries&&md.dayEntries[t]&&md.dayEntries[t].water)||0;st=w?w+" L water":"tap to log";}
    else if(m.id==="reading"){const p=list.reduce((a,e)=>a+(+e.pages||0),0);big=p?p+'<small> pg</small>':"";st=list.length?list.length+" session"+(list.length>1?"s":""):"tap to log";}
    else if(m.id==="tutoring"){big=list.length?list.length+'<small> class</small>':"";st=list.length?"logged":"tap to log";}
    else if(m.id==="finance"){const s=list.reduce((a,e)=>a+(+e.amount||0),0);big=s?'₹'+s:"";st=list.length?list.length+" items":"tap to log";}
    else if(m.id==="circadian"){big=list.length?list.length+'<small>×</small>':"";st=list.length?"readings":"tap to log";}
    else if(m.id==="leetcode"){const s=list.reduce((a,e)=>a+(+e.solved||0),0);big=s?s+'<small> solved</small>':"";st=list.length?list.length+" set"+(list.length>1?"s":""):"tap to log";}
    else if(m.id==="contacts"){big=list.length?list.length+'<small> new</small>':"";st=list.length?"contacts":"tap to log";}
    return{done,big,st};
  }else{
    const e=md.entries[t];let done=!!e;let big="",st="tap to log";
    if(m.id==="sleep"){if(e){big=(e.hours||"?")+'<small> h</small>';st="Q "+(e.quality||"–")+"/10";}}
    else if(m.id==="research"){if(e){big=(e.deep||0)+'<small> h</small>';st=e.progress?trim(e.progress):"deep work";}}
    else if(m.id==="study"){if(e){big=(e.hours||0)+'<small> h</small>';st=e.topic?trim(e.topic):"studied";}}
    else if(m.id==="mood"){if(e){big=(e.energy||"–")+'<small>/10</small>';st="energy";}}
    else if(m.id==="habits"){if(e){const c=["wake","meditate","noscreen","sunlight"].filter(k=>e[k]).length;big=c+'<small>/4</small>';st="done today";done=true;}}
    else if(m.id==="code"){if(e){big=(e.commits||0)+'<small> commits</small>';st=e.committed?"pushed ✓":(e.what?trim(e.what):"logged");}}
    else if(m.id==="kaggle"){if(e){big=e.done?"✓":"—";st=e.note?trim(e.note):(e.done?"worked":"skipped");}}
    else if(m.id==="linux"){if(e){big=e.done?"✓":"—";st=e.topic?trim(e.topic):(e.done?"studied":"skipped");}}
    else if(m.id==="gate"){if(e){big=e.done?"✓":"—";st=e.subject?trim(e.subject):(e.done?"studied":"skipped");}}
    else if(m.id==="coursera"){if(e){big=e.done?"✓":"—";st=e.course?trim(e.course):(e.done?"progressed":"skipped");}}
    return{done,big,st};
  }
}
function trim(s){return s.length>22?s.slice(0,22)+"…":s;}
function streakOf(m){
  // count consecutive days (back from today) with any entry
  let n=0;const md=DB.modules[m.id];const d=new Date();
  for(let i=0;i<400;i++){const t=new Date(d);t.setDate(d.getDate()-i);const s=t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");
    const e=md.entries[s];const has=m.multi?(e&&e.length):!!e;
    if(has)n++;else if(i>0)break;else break;}
  return n;
}
function renderGrid(){
  const g=document.getElementById("grid");g.innerHTML="";
  MODULES.forEach(m=>{
    const s=moduleSummary(m);const strk=streakOf(m);
    const c=document.createElement("button");
    c.className="card"+(s.done?" done":"");
    c.innerHTML=`<span class="accentbar"></span>
      ${strk>1?`<span class="streak">${strk}d</span>`:""}
      <span class="nm">${m.name}</span>
      ${s.big?`<div class="big">${s.big}</div>`:""}
      <span class="st">${s.st}</span>`;
    c.onclick=()=>openModule(m.id);
    g.appendChild(c);
  });
  renderDayHeader();
  drawOverview();
}

/* ============ module sheet ============ */
let CUR=null;
function openModule(id){CUR=id;const m=MOD[id];
  document.getElementById("sheetTtl").textContent=m.name;
  buildSheet(m);
  document.getElementById("sheet").classList.add("open");document.body.style.overflow="hidden";
}
function closeSheet(){document.getElementById("sheet").classList.remove("open");document.body.style.overflow="";CUR=null;renderGrid();}

function fieldInput(f,val){
  const id="f_"+f.key;
  if(f.type==="scale"){
    let h=`<div class="scale" data-key="${f.key}">`;
    for(let i=1;i<=10;i++)h+=`<button type="button" onclick="pickScale(this,'${f.key}',${i})" class="${val==i?"on":""}">${i}</button>`;
    return h+`</div>`;
  }
  if(f.type==="bool"){
    return `<div class="tgl" data-key="${f.key}">
      <button type="button" onclick="pickBool(this,'${f.key}',true)" class="${val===true?"on-y":""}">Yes</button>
      <button type="button" onclick="pickBool(this,'${f.key}',false)" class="${val===false?"on-n":""}">No</button></div>`;
  }
  if(f.type==="select"){
    let h=`<select class="inp" id="${id}">`;h+=`<option value="">–</option>`;
    f.options.forEach(o=>h+=`<option ${val===o?"selected":""}>${o}</option>`);return h+`</select>`;
  }
  if(f.type==="time")return `<input class="inp" id="${id}" type="time" value="${val||""}">`;
  if(f.type==="number")return `<input class="inp" id="${id}" type="number" inputmode="decimal" step="any" value="${val??""}">`;
  if(f.type==="counter"){const step=f.step||1;const v=+val||0;
    return `<div class="counter" data-key="${f.key}" data-val="${v}" data-step="${step}">
      <button type="button" class="stbtn" onclick="stepField(this,-1)">–</button>
      <div class="cv nval">${v}</div>
      <button type="button" class="stbtn" onclick="stepField(this,1)">+</button></div>`;}
  if(f.type==="text")return `<input class="inp" id="${id}" type="text" value="${val?String(val).replace(/"/g,"&quot;"):""}">`;
  return "";
}
window.stepField=(btn,dir)=>{const c=btn.parentElement;const step=+c.dataset.step||1;let v=(+c.dataset.val||0)+dir*step;if(v<0)v=0;v=+v.toFixed(2);c.dataset.val=v;c.querySelector(".cv").textContent=v;};
window.pickScale=(el,k,v)=>{el.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("on"));el.classList.add("on");el.parentElement.dataset.val=v;};
window.pickBool=(el,k,v)=>{const p=el.parentElement;p.querySelectorAll("button").forEach(b=>{b.classList.remove("on-y","on-n");});el.classList.add(v?"on-y":"on-n");p.dataset.val=v?"1":"0";};

function readForm(m){
  const obj={};
  allFields(m).forEach(f=>{
    if(f.type==="scale"){const c=document.querySelector(`.scale[data-key="${f.key}"]`);if(c&&c.dataset.val)obj[f.key]=+c.dataset.val;}
    else if(f.type==="bool"){const c=document.querySelector(`.tgl[data-key="${f.key}"]`);if(c&&c.dataset.val!==undefined)obj[f.key]=c.dataset.val==="1";}
    else if(f.type==="counter"){const c=document.querySelector(`.counter[data-key="${f.key}"]`);if(c&&+c.dataset.val>0)obj[f.key]=+c.dataset.val;}
    else{const el=document.getElementById("f_"+f.key);if(el&&el.value!=="")obj[f.key]=f.type==="number"?+el.value:el.value;}
  });
  return obj;
}

/* ===== nutrition: meal nutrient steppers ===== */
let NDRAFT=null, NMEAL="Breakfast";
function mealEntry(t,slot){return (DB.modules.nutrition.entries[t]||[]).find(e=>e.slot===slot);}
function loadDraft(t){NDRAFT={};MEAL_SLOTS.forEach(s=>{const e=mealEntry(t,s)||{};const o={};NUTRIENTS.forEach(n=>o[n.key]=+e[n.key]||0);o.micros=(e.micros||[]).slice();NDRAFT[s]=o;});}
function mealLogged(t,slot){const d=(NDRAFT&&NDRAFT[slot])||{};return NUTRIENTS.some(n=>(+d[n.key]||0)>0)||(d.micros&&d.micros.length>0);}
window.microTog=function(mic){const arr=NDRAFT[NMEAL].micros;const i=arr.indexOf(mic);if(i<0)arr.push(mic);else arr.splice(i,1);renderMealCard();};
window.nutTab=function(slot){NMEAL=slot;renderMealCard();};
window.nutStep=function(key,dir){const n=NUTRIENTS.find(x=>x.key===key);let v=(+NDRAFT[NMEAL][key]||0)+dir*n.step;if(v<0)v=0;NDRAFT[NMEAL][key]=+v.toFixed(2);
  const el=document.getElementById("nv_"+key);if(el)el.firstChild.textContent=NDRAFT[NMEAL][key];};
window.waterStep=function(dir){const t=todayStr();const md=DB.modules.nutrition;md.dayEntries=md.dayEntries||{};md.dayEntries[t]=md.dayEntries[t]||{};
  let v=(+md.dayEntries[t].water||0)+dir*0.25;if(v<0)v=0;md.dayEntries[t].water=+v.toFixed(2);save();
  const el=document.getElementById("waterVal");if(el)el.firstChild.textContent=md.dayEntries[t].water;
  renderGrid();renderGauge();};
window.saveMeal=function(){const t=todayStr();const md=DB.modules.nutrition;md.entries[t]=md.entries[t]||[];
  const arr=md.entries[t];const data=NDRAFT[NMEAL];const any=NUTRIENTS.some(n=>(+data[n.key]||0)>0)||(data.micros&&data.micros.length>0);
  let e=arr.find(x=>x.slot===NMEAL);
  if(!any){if(e){arr.splice(arr.indexOf(e),1);if(!arr.length)delete md.entries[t];}toast(NMEAL+" cleared");}
  else if(e){NUTRIENTS.forEach(n=>e[n.key]=+data[n.key]||0);e.micros=data.micros.slice();e._time=new Date().toTimeString().slice(0,5);toast(NMEAL+" saved");}
  else{const o={slot:NMEAL,meal:NMEAL,_id:Date.now(),_time:new Date().toTimeString().slice(0,5),micros:data.micros.slice()};NUTRIENTS.forEach(n=>o[n.key]=+data[n.key]||0);arr.push(o);toast(NMEAL+" saved");}
  save();renderGrid();renderGauge();renderMealCard();buildHistory(MOD.nutrition);drawChart();};
function renderMealCard(){
  const wrap=document.getElementById("mealWrap");if(!wrap)return;const t=todayStr();
  const tabs=MEAL_SLOTS.map(s=>`<button class="${s===NMEAL?'on':''}" onclick="nutTab('${s}')">${s}${mealLogged(t,s)?' ✓':''}</button>`).join("");
  const d=NDRAFT[NMEAL];
  const rows=NUTRIENTS.map(n=>`<div class="stepper">
      <div class="nlab">${n.label}<small>goal ${n.goal} ${n.unit}/day</small></div>
      <div class="nctrl">
        <button class="stbtn" onclick="nutStep('${n.key}',-1)">–</button>
        <div class="nval" id="nv_${n.key}">${+d[n.key]||0}<small>${n.unit}</small></div>
        <button class="stbtn" onclick="nutStep('${n.key}',1)">+</button>
      </div></div>`).join("");
  const sel=d.micros||[];
  const micChips=MICROS.map(mic=>`<button class="mchip${sel.includes(mic)?' on':''}" onclick="microTog('${mic.replace(/'/g,"\\'")}')">${mic}</button>`).join("");
  wrap.innerHTML=`<div class="meal-tabs">${tabs}</div><div class="nut-grid">${rows}</div>
    <div class="micro-head">Micronutrient sources <span>${sel.length?sel.length+" tapped":"tap what this meal had"}</span></div>
    <div class="micro-wrap">${micChips}</div>
    <button class="btn" style="margin-top:16px" onclick="saveMeal()">Save ${NMEAL}</button>`;
}
function buildNutritionSheet(m){
  const md=DB.modules[m.id];const t=todayStr();const body=document.getElementById("sheetBody");
  loadDraft(t);
  const water=(md.dayEntries&&md.dayEntries[t]&&md.dayEntries[t].water)||0;
  let h=`<div class="sec"><div class="sec-t">Water today</div>
      <div class="stepper">
        <div class="nlab">Water<small>goal 3 L/day</small></div>
        <div class="nctrl">
          <button class="stbtn" onclick="waterStep(-1)">–</button>
          <div class="nval" id="waterVal">${water}<small>L</small></div>
          <button class="stbtn" onclick="waterStep(1)">+</button>
        </div></div></div>`;
  h+=`<div class="sec"><div class="sec-t">Meals · nutrients</div><div id="mealWrap"></div></div>`;
  // trends + history (same as generic)
  const chartables=m.fields.filter(f=>f.chart&&f.type==="number");
  const allChart=[{...m.dayField,day:true}].concat(chartables);
  h+=`<div class="sec"><div class="sec-t">Trends</div>
      <div class="rov" id="rov"></div>
      <div class="chart-wrap"><div class="chart-top">
        <span style="font-size:12px;color:var(--muted)">metric</span>
        <div class="metric-sel"><select class="mini-sel" id="metricSel" onchange="drawChart()">
          ${allChart.map(f=>`<option value="${f.key}" data-day="${f.day?1:0}">${f.label}</option>`).join("")}
        </select></div></div>
        <svg class="chart" id="chartSvg" viewBox="0 0 320 150" preserveAspectRatio="none"></svg>
        <div class="cstat" id="cstat"></div></div></div>`;
  h+=`<div class="sec"><div class="sec-t">History</div><div id="hist"></div></div>`;
  body.innerHTML=h;
  renderMealCard();buildRov(m);drawChart();buildHistory(m);
}

function buildSheet(m){
  if(m.id==="nutrition")return buildNutritionSheet(m);
  const md=DB.modules[m.id];const t=todayStr();const body=document.getElementById("sheetBody");
  const fields=allFields(m);
  let entryVals=m.multi?{}:(md.entries[t]||{});
  // --- entry form ---
  let h=`<div class="sec"><div class="sec-t">${m.multi?"Add entry":"Today"}</div>`;
  if(m.dayField){const dv=(md.dayEntries&&md.dayEntries[t]&&md.dayEntries[t][m.dayField.key])??"";
    h+=`<div class="field"><label>${m.dayField.label} <span class="unit">${m.dayField.unit||""}</span></label>
        <input class="inp" id="dayf" type="number" inputmode="decimal" step="any" value="${dv}"></div>`;}
  fields.forEach(f=>{
    h+=`<div class="field"><label>${f.label} ${f.unit?`<span class="unit">${f.unit}</span>`:""}${f.custom?' <span class="unit">· custom</span>':""}</label>${fieldInput(f,entryVals[f.key])}</div>`;
  });
  h+=`<button class="btn" onclick="saveEntry()">${m.multi?"Add entry":"Save today"}</button></div>`;

  // --- add custom parameter ---
  h+=`<div class="sec"><div class="sec-t">Custom parameters</div>
      <div>${(md.params||[]).map((p,i)=>`<span class="param-tag">${p.label} <span class="x" onclick="delParam(${i})">✕</span></span>`).join("")||'<span class="empty" style="padding:0">none yet</span>'}</div>
      <div class="addparam">
        <input class="inp" id="npName" placeholder="New parameter name">
        <select class="inp" id="npType" style="max-width:120px">
          <option value="number">Number</option><option value="scale">Scale 1-10</option>
          <option value="text">Text</option><option value="bool">Yes/No</option>
        </select>
      </div>
      <button class="btn ghost mini" style="margin-top:8px" onclick="addParam()">+ Add parameter</button></div>`;

  // --- chart + range override ---
  const chartables=fields.filter(f=>f.chart||f.type==="scale"||f.type==="number"||f.type==="counter");
  const dayChart=m.dayField&&(m.dayField.chart)?[{...m.dayField,day:true}]:[];
  const allChart=dayChart.concat(chartables);
  if(allChart.length){
    h+=`<div class="sec"><div class="sec-t">Trends</div>
      <div class="rov" id="rov"></div>
      <div class="chart-wrap">
        <div class="chart-top">
          <span style="font-size:12px;color:var(--muted)">metric</span>
          <div class="metric-sel"><select class="mini-sel" id="metricSel" onchange="drawChart()">
            ${allChart.map(f=>`<option value="${f.key}" data-day="${f.day?1:0}">${f.label}</option>`).join("")}
          </select></div>
        </div>
        <svg class="chart" id="chartSvg" viewBox="0 0 320 150" preserveAspectRatio="none"></svg>
        <div class="cstat" id="cstat"></div>
      </div></div>`;
  }

  // --- history ---
  h+=`<div class="sec"><div class="sec-t">History</div><div id="hist"></div></div>`;
  body.innerHTML=h;

  buildRov(m);
  drawChart();
  buildHistory(m);
}

function buildRov(m){
  const rov=document.getElementById("rov");if(!rov)return;rov.innerHTML="";
  const cur=DB.modules[m.id].range||"(global)";
  const g=document.createElement("button");g.className="chip"+(!DB.modules[m.id].range?" on":"");g.textContent="Global";
  g.onclick=()=>{DB.modules[m.id].range=null;save();buildRov(m);drawChart();};rov.appendChild(g);
  RANGES.forEach(r=>{const b=document.createElement("button");b.className="chip"+(DB.modules[m.id].range===r.k?" on":"");b.textContent=r.n;
    b.onclick=()=>{DB.modules[m.id].range=r.k;save();buildRov(m);drawChart();};rov.appendChild(b);});
}

window.saveEntry=function(){
  const m=MOD[CUR];const md=DB.modules[m.id];const t=todayStr();
  const obj=readForm(m);
  if(m.dayField){const el=document.getElementById("dayf");if(el&&el.value!==""){md.dayEntries=md.dayEntries||{};md.dayEntries[t]=md.dayEntries[t]||{};md.dayEntries[t][m.dayField.key]=+el.value;}}
  if(m.multi){
    if(Object.keys(obj).length===0&&!(m.dayField)){toast("Nothing to add");return;}
    if(Object.keys(obj).length){obj._id=Date.now();obj._time=new Date().toTimeString().slice(0,5);md.entries[t]=md.entries[t]||[];md.entries[t].push(obj);}
  }else{
    md.entries[t]={...(md.entries[t]||{}),...obj};
  }
  save();toast("Saved");buildSheet(m);
};
window.addParam=function(){

  if(!name){toast("Enter a name");return;}
  const key="c_"+name.toLowerCase().replace(/[^a-z0-9]/g,"_")+"_"+Math.random().toString(36).slice(2,5);

};
window.delParam=function(i){DB.modules[CUR].params.splice(i,1);save();buildSheet(MOD[CUR]);};

/* ============ chart (vanilla SVG) ============ */
window.drawChart=function(){
  const m=MOD[CUR];if(!m)return;const sel=document.getElementById("metricSel");if(!sel)return;
  const key=sel.value;const isDay=sel.selectedOptions[0].dataset.day==="1";
  const md=DB.modules[m.id];const days=rangeDays(m.id);const dates=datesInRange(days);
  const pts=dates.map(d=>{
    let v=null;
    if(isDay){v=md.dayEntries&&md.dayEntries[d]?md.dayEntries[d][key]:null;}
    else if(m.multi){const list=md.entries[d]||[];
      const valid=list.map(e=>e[key]).filter(x=>x!==undefined&&x!==""&&!isNaN(+x)).map(Number);
      if(valid.length)v=valid.reduce((a,b)=>a+b,0);/*sum per day*/}
    else{const e=md.entries[d];v=e&&e[key]!==undefined&&e[key]!==""?+e[key]:null;}
    return{d,v:(v===null||isNaN(v))?null:v};
  });
  const svg=document.getElementById("chartSvg");const W=320,H=150,pad=6,bottom=16;
  const vals=pts.map(p=>p.v).filter(v=>v!==null);
  if(!vals.length){svg.innerHTML=`<text x="160" y="75" fill="#9aa0ad" font-size="12" text-anchor="middle">No data in range</text>`;document.getElementById("cstat").innerHTML="";return;}
  let mn=Math.min(...vals),mx=Math.max(...vals);if(mn===mx){mn=mn-1;mx=mx+1;}
  const plotW=W-pad*2,plotH=H-bottom-pad;
  const x=i=>pad+(pts.length===1?plotW/2:i/(pts.length-1)*plotW);
  const y=v=>pad+plotH-((v-mn)/(mx-mn))*plotH;
  // gridlines
  let g="";for(let i=0;i<=2;i++){const yy=pad+plotH*i/2;g+=`<line x1="${pad}" y1="${yy}" x2="${W-pad}" y2="${yy}" stroke="#e6e8ec" stroke-width="1"/>`;}
  // line path through non-null
  let dpath="",started=false,area="";
  pts.forEach((p,i)=>{if(p.v===null)return;const X=x(i),Y=y(p.v);if(!started){dpath=`M${X} ${Y}`;area=`M${X} ${pad+plotH} L${X} ${Y}`;started=true;}else{dpath+=` L${X} ${Y}`;area+=` L${X} ${Y}`;}});
  // close area
  let lastX=pad+plotW;for(let i=pts.length-1;i>=0;i--){if(pts[i].v!==null){lastX=x(i);break;}}
  area+=` L${lastX} ${pad+plotH} Z`;
  // dots
  let dots="";pts.forEach((p,i)=>{if(p.v===null)return;dots+=`<circle cx="${x(i)}" cy="${y(p.v)}" r="2.5" fill="#16a34a"/>`;});
  svg.innerHTML=`${g}
    <path d="${area}" fill="url(#grad)" opacity="0.25"/>
    <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#16a34a"/><stop offset="1" stop-color="#16a34a" stop-opacity="0"/></linearGradient></defs>
    <path d="${dpath}" fill="none" stroke="#16a34a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${pad}" y="${H-4}" fill="#9aa0ad" font-size="9">${fmtDate(pts[0].d)}</text>
    <text x="${W-pad}" y="${H-4}" fill="#9aa0ad" font-size="9" text-anchor="end">${fmtDate(pts[pts.length-1].d)}</text>`;
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  document.getElementById("cstat").innerHTML=`<span>avg <b>${avg.toFixed(1)}</b></span><span>min <b>${mn.toFixed(1)}</b></span><span>max <b>${mx.toFixed(1)}</b></span><span>days <b>${vals.length}</b></span>`;
};

/* ============ history ============ */
function buildHistory(m){
  const md=DB.modules[m.id];const el=document.getElementById("hist");if(!el)return;
  const days=rangeDays(m.id);const dates=datesInRange(days).slice().reverse();
  let rows="";
  dates.forEach(d=>{
    if(m.multi){(md.entries[d]||[]).slice().reverse().forEach(e=>{
      const desc=m.fields.map(f=>e[f.key]!==undefined&&e[f.key]!==""?`${e[f.key]}${f.unit?f.unit:""}`:null).filter(Boolean).join(" · ");
      const cust=(md.params||[]).map(p=>e[p.key]!==undefined&&e[p.key]!==""?`${p.label}:${e[p.key]}`:null).filter(Boolean).join(" · ");
      rows+=`<div class="row"><span class="rd">${fmtDate(d)}<br><span style="color:var(--faint)">${e._time||""}</span></span><span class="rv">${desc}${cust?" · "+cust:""}</span><button class="del" onclick="delMulti('${m.id}','${d}',${e._id})">🗑</button></div>`;
    });}
    else{const e=md.entries[d];if(!e)return;
      const desc=allFields(m).map(f=>{let v=e[f.key];if(v===undefined||v==="")return null;if(f.type==="bool")v=v?"✓":"✗";return `${f.label.split(" ")[0]}:${v}`;}).filter(Boolean).join(" · ");
      rows+=`<div class="row"><span class="rd">${fmtDate(d)}</span><span class="rv">${desc}</span><button class="del" onclick="delSingle('${m.id}','${d}')">🗑</button></div>`;
    }
  });
  el.innerHTML=rows||`<div class="empty">No entries in this range yet</div>`;
}
window.delMulti=(mid,d,eid)=>{const a=DB.modules[mid].entries[d];DB.modules[mid].entries[d]=a.filter(e=>e._id!==eid);if(!DB.modules[mid].entries[d].length)delete DB.modules[mid].entries[d];save();buildSheet(MOD[mid]);};
window.delSingle=(mid,d)=>{delete DB.modules[mid].entries[d];save();buildSheet(MOD[mid]);};

window.exportData=function(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download="lifelog-backup-"+todayStr()+".json";a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);toast("Backup downloaded");
};
window.importData=function(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.modules)throw 0;DB=d;MODULES.forEach(m=>{if(!DB.modules[m.id])DB.modules[m.id]={entries:{},params:[],range:null};if(!DB.modules[m.id].params)DB.modules[m.id].params=[];});if(!DB.settings)DB.settings={globalRange:"7d"};save();toast("Imported");buildSettings();renderRangeBar();renderGrid();}catch(e){toast("Bad file");}};
  r.readAsText(f);};
window.wipe=function(){if(confirm("Erase everything? Export a backup first.")){DB=freshDB();save();toast("Erased");buildSettings();renderGrid();}};

/* ============ github gist cloud sync ============ */
const GH_KEY="lifelog.gh";
function ghCfg(){try{return JSON.parse(localStorage.getItem(GH_KEY))||{};}catch(e){return {};}}
function ghSet(c){localStorage.setItem(GH_KEY,JSON.stringify(c));}
function ghHeaders(c){return {"Authorization":"token "+c.token,"Accept":"application/vnd.github+json","Content-Type":"application/json"};}
function normalizeDB(){DB.settings=DB.settings||{globalRange:"30d"};MODULES.forEach(m=>{if(!DB.modules[m.id])DB.modules[m.id]={entries:{},params:[],range:null};if(!DB.modules[m.id].params)DB.modules[m.id].params=[];});}
window.ghSaveCfg=async function(){
  const token=document.getElementById("ghTok").value.trim();
  const gistId=document.getElementById("ghGist").value.trim();
  ghSet({token,gistId});
  if(!token){toast("Token cleared");buildSettings();return;}
  await ghPush(true);buildSettings();
};
async function ghPush(manual){
  const c=ghCfg();if(!c.token){if(manual)toast("Add a token first");return;}
  const body={description:"Lifelog data",files:{"lifelog.json":{content:JSON.stringify(DB)}}};
  try{
    let res,id=c.gistId;
    if(id){res=await fetch("https://api.github.com/gists/"+id,{method:"PATCH",headers:ghHeaders(c),body:JSON.stringify(body)});}
    else{body.public=false;res=await fetch("https://api.github.com/gists",{method:"POST",headers:ghHeaders(c),body:JSON.stringify(body)});}
    if(!res.ok)throw new Error("HTTP "+res.status);
    const j=await res.json();
    if(!id){c.gistId=j.id;ghSet(c);}
    DB.settings._synced=Date.now();localStorage.setItem(KEY,JSON.stringify(DB));
    if(manual)toast("Synced ✓");
    const st=document.getElementById("ghStat");if(st)st.textContent="Synced "+new Date().toLocaleString();
  }catch(e){if(manual)toast("Sync failed: "+e.message);}
}
window.ghPull=async function(manual){
  const c=ghCfg();if(!c.token||!c.gistId){if(manual)toast("Save token + gist first");return;}
  try{
    const res=await fetch("https://api.github.com/gists/"+c.gistId,{headers:ghHeaders(c)});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const j=await res.json();const f=j.files&&j.files["lifelog.json"];
    if(!f)throw new Error("no data file in gist");
    let content=f.content;if(f.truncated&&f.raw_url)content=await (await fetch(f.raw_url)).text();
    const remote=JSON.parse(content);
    if(!remote||!remote.modules)throw new Error("bad data");
    DB=remote;normalizeDB();localStorage.setItem(KEY,JSON.stringify(DB));
    toast("Pulled ✓");buildSettings();renderRangeBar();renderGrid();initOverviewSel();drawOverview();
  }catch(e){if(manual)toast("Pull failed: "+e.message);}
};
async function ghBootSync(){
  const c=ghCfg();if(!c.token||!c.gistId)return;
  try{
    const res=await fetch("https://api.github.com/gists/"+c.gistId,{headers:ghHeaders(c)});
    if(!res.ok)return;
    const j=await res.json();const f=j.files&&j.files["lifelog.json"];if(!f)return;
    let content=f.content;if(f.truncated&&f.raw_url)content=await (await fetch(f.raw_url)).text();
    const remote=JSON.parse(content);if(!remote||!remote.modules)return;
    const rt=(remote.settings&&remote.settings._updated)||0;
    const lt=(DB.settings&&DB.settings._updated)||0;
    if(rt>lt){DB=remote;normalizeDB();localStorage.setItem(KEY,JSON.stringify(DB));renderRangeBar();renderGrid();initOverviewSel();drawOverview();toast("Synced from cloud");}
    else if(lt>rt){ghPush(false);}
  }catch(e){}
}

function openWeekly(){buildWeekly();document.getElementById("wkSheet").classList.add("open");document.body.style.overflow="hidden";}

function sumMetric(mid,key,days,multi,day){
  const dates=datesInRange(days);const md=DB.modules[mid];let s=0,n=0;
  dates.forEach(d=>{let v=null;
    if(day){v=md.dayEntries&&md.dayEntries[d]?md.dayEntries[d][key]:null;}
    else if(multi){const list=md.entries[d]||[];list.forEach(e=>{if(e[key]!==undefined&&e[key]!==""&&!isNaN(+e[key])){s+=+e[key];n++;}});return;}
    else{const e=md.entries[d];v=e&&e[key]!==undefined?+e[key]:null;}
    if(v!==null&&!isNaN(v)){s+=v;n++;}});
  return{sum:s,n,avg:n?s/n:0};
}
function buildWeekly(){

    ${wkLine("Avg sleep",sleep.n?sleep.avg.toFixed(1)+" h":"—")}

    ${wkLine("Study time",study.sum?study.sum.toFixed(1)+" h":"—")}
    ${wkLine("Exercise",fit.sum?fit.sum+" min":"—")}
    ${wkLine("Pages read",read.sum||"—")}
    ${wkLine("Avg water",water.n?water.avg.toFixed(1)+" L":"—")}
    ${wkLine("Avg energy",energy.n?energy.avg.toFixed(1)+"/10":"—")}

  </div>

  </div>`;
}
function wkLine(l,v){return `<div class="wk-line"><span>${l}</span><span class="v">${v}</span></div>`;}

/* ============ daily throttle score ============ */
function num(v){return (v===undefined||v===null||v==="")?null:(isNaN(+v)?null:+v);}
function clamp01(x){return x<0?0:x>1?1:x;}
function rawThrottle(d){
  const M=DB.modules;const parts=[];
  // sleep: hours near 7.5 ideal + quality + timing (bed before 1am)
  const s=M.sleep.entries[d];
  if(s){let sc=0,w=0;
    if(num(s.hours)!==null){const h=+s.hours;sc+=clamp01(1-Math.abs(h-7.5)/4);w++;}
    if(num(s.quality)!==null){sc+=(+s.quality)/10;w++;}
    if(s.bed){const hh=+s.bed.split(":")[0];const bedGood=(hh>=21||hh<=1)?1:(hh<=3?0.3:0);sc+=bedGood;w++;}
    if(w)parts.push([sc/w,1.0]);
  }
  // exercise
  const fx=M.fitness.entries[d]||[];const mins=fx.reduce((a,e)=>a+(num(e.mins)||0),0);
  if(fx.length)parts.push([clamp01(mins/40),1.0]);
  // nutrition: meals + protein
  const nu=M.nutrition.entries[d]||[];const meals=nu.length;const prot=nu.reduce((a,e)=>a+(num(e.protein)||0),0);
  if(nu.length)parts.push([clamp01(meals/3)*0.5+clamp01(prot/60)*0.5,1.0]);
  // study + research hours (only count if logged; logged 0h counts as 0)
  const st=M.study.entries[d],re=M.research.entries[d];
  if(st||re){const hrs=(st&&num(st.hours)||0)+(re&&num(re.deep)||0);
    parts.push([clamp01(hrs/6),1.0]);}
  // habits
  const hb=M.habits.entries[d];if(hb){const c=["wake","meditate","noscreen","sunlight"].filter(k=>hb[k]).length;parts.push([c/4,1.0]);}
  // water (lighter weight)
  const wa=M.nutrition.dayEntries&&M.nutrition.dayEntries[d]?num(M.nutrition.dayEntries[d].water):null;
  if(wa!==null)parts.push([clamp01(wa/3),0.6]);
  // code + github: commits (3 = full); a commit flag floors it
  const cd=M.code.entries[d];
  if(cd){let sc=clamp01((num(cd.commits)||0)/3);if(cd.committed)sc=Math.max(sc,0.6);parts.push([sc,1.0]);}
  // leetcode: total solved (3 = full)
  const lc=M.leetcode.entries[d]||[];
  if(lc.length){const solved=lc.reduce((a,e)=>a+(num(e.solved)||0),0);parts.push([clamp01(solved/3),1.0]);}
  // gate 2027 prep
  const gt=M.gate.entries[d];if(gt)parts.push([gt.done?1:0,1.0]);
  // reading pages (20 = full)
  const rd=M.reading.entries[d]||[];
  if(rd.length){const pg=rd.reduce((a,e)=>a+(num(e.pages)||0),0);parts.push([clamp01(pg/20),1.0]);}
  // kaggle / linux / coursera — toggles
  const kg=M.kaggle.entries[d];if(kg)parts.push([kg.done?1:0,1.0]);
  const lx=M.linux.entries[d];if(lx)parts.push([lx.done?1:0,1.0]);
  const cr=M.coursera.entries[d];if(cr)parts.push([cr.done?1:0,1.0]);
  const anyReal=s||fx.length||nu.length||st||re||hb||wa!==null||cd||lc.length||gt||rd.length||kg||lx||cr;
  if(!anyReal)return null;
  let sw=0,tw=0;parts.forEach(([v,w])=>{sw+=v*w;tw+=w;});
  return Math.round(clamp01(sw/tw)*100);
}

/* ===== momentum: compounding drag (opt.3) + carryover (opt.4) ===== */
let _thrCache={};
function clearThr(){_thrCache={};}
function prevDay(d){const[y,m,dd]=d.split("-").map(Number);const t=new Date(y,m-1,dd);t.setDate(t.getDate()-1);
  return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");}
function firstEntryDate(){
  if(_thrCache._first!==undefined)return _thrCache._first;
  let min=null;MODULES.forEach(m=>{const md=DB.modules[m.id];
    if(md.entries)Object.keys(md.entries).forEach(d=>{if(!min||d<min)min=d;});
    if(md.dayEntries)Object.keys(md.dayEntries).forEach(d=>{if(!min||d<min)min=d;});});
  return _thrCache._first=min;}
// a "miss" day = ANY of the 13 odometer areas not done
function isMissDay(d){const M=DB.modules;
  const s=M.sleep.entries[d];
  const fx=M.fitness.entries[d]||[];const mins=fx.reduce((a,e)=>a+(num(e.mins)||0),0);
  const nu=M.nutrition.entries[d]||[];
  const st=M.study.entries[d],re=M.research.entries[d];const hrs=(st&&num(st.hours)||0)+(re&&num(re.deep)||0);
  const hb=M.habits.entries[d];const hc=hb?["wake","meditate","noscreen","sunlight"].filter(k=>hb[k]).length:0;
  const wa=M.nutrition.dayEntries&&M.nutrition.dayEntries[d]?num(M.nutrition.dayEntries[d].water):null;
  const cd=M.code.entries[d];
  const lc=M.leetcode.entries[d]||[];const solved=lc.reduce((a,e)=>a+(num(e.solved)||0),0);
  const gt=M.gate.entries[d];
  const rd=M.reading.entries[d]||[];const pg=rd.reduce((a,e)=>a+(num(e.pages)||0),0);
  const kg=M.kaggle.entries[d],lx=M.linux.entries[d],cr=M.coursera.entries[d];
  const done=[!!s,mins>0,nu.length>0,hrs>0,hc>0,(wa||0)>0,
    !!(cd&&(cd.committed||(num(cd.commits)||0)>0)),solved>0,!!(gt&&gt.done),pg>0,
    !!(kg&&kg.done),!!(lx&&lx.done),!!(cr&&cr.done)];
  return done.some(x=>!x);}
// consecutive miss days ending at d (0 if today not a miss). bounded by first log + cap 12
function missStreak(d){const first=firstEntryDate();if(!first)return 0;
  let n=0,cur=d;while(cur>=first&&n<12){if(isMissDay(cur)){n++;cur=prevDay(cur);}else break;}return n;}
// triangular penalty: 1→3, 2→6, 3→10, 4→15 … capped 40
function missDrag(s){return s<=0?0:Math.min(40,(s+1)*(s+2)/2);}
function throttleForDate(d){
  if(_thrCache[d]!==undefined)return _thrCache[d];
  _thrCache[d]=null; // guard against re-entry
  const raw=rawThrottle(d);
  if(raw===null)return _thrCache[d]=null;
  let adj=raw-missDrag(missStreak(d));if(adj<0)adj=0;if(adj>100)adj=100;
  // carryover: 30% of most recent logged day's final score
  const first=firstEntryDate();let p=prevDay(d),guard=0,prevF=null;
  while(first&&p>=first&&guard<400){if(rawThrottle(p)!==null){prevF=throttleForDate(p);break;}p=prevDay(p);guard++;}
  const val=(prevF===null)?adj:(0.7*adj+0.3*prevF);
  return _thrCache[d]=Math.round(val);
}
function throttleWord(v){
  if(v<35)return["Idle","#dc2626"];       // red
  if(v<65)return["Cruising","#d97706"];    // amber
  return["Strong","#16a34a"];              // green
}
function gaugePt(a,rad){const r=a*Math.PI/180;return [100+rad*Math.cos(r),100-rad*Math.sin(r)];}
function renderGauge(){
  clearThr();
  const v=throttleForDate(todayStr());
  const svg=document.getElementById("gaugeSvg");
  document.getElementById("gaugeDate").textContent=new Date().toLocaleDateString(undefined,{day:"numeric",month:"short"});
  const R=82;
  // track
  let track="";for(let a=180;a>=0;a-=3){const[x,y]=gaugePt(a,R);track+=(a===180?"M":"L")+x.toFixed(1)+" "+y.toFixed(1)+" ";}
  if(v===null){
    svg.innerHTML=`<path d="${track}" fill="none" stroke="#e6e8ec" stroke-width="12" stroke-linecap="round"/>
      <text x="100" y="96" font-size="26" font-weight="800" text-anchor="middle" fill="#9aa0ad">–</text>`;
    document.getElementById("gWord").textContent="No data";document.getElementById("gWord").style.color="var(--faint)";
    document.getElementById("gHint").textContent="Log today to see your throttle";return;
  }
  const aVal=180*(1-v/100);
  let val="";for(let a=180;a>=aVal;a-=3){const[x,y]=gaugePt(a,R);val+=(val===""?"M":"L")+x.toFixed(1)+" "+y.toFixed(1)+" ";}
  const[wd,col]=throttleWord(v);
  const[nx,ny]=gaugePt(aVal,R-6);
  svg.innerHTML=`<path d="${track}" fill="none" stroke="#eceef2" stroke-width="12" stroke-linecap="round"/>
    <path d="${val}" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="${col}" stroke-width="3" stroke-linecap="round"/>
    <circle cx="100" cy="100" r="5" fill="${col}"/>
    <text x="24" y="114" font-size="9" fill="#9aa0ad">0</text>
    <text x="176" y="114" font-size="9" fill="#9aa0ad" text-anchor="end">100</text>
    <text x="100" y="82" font-size="32" font-weight="800" text-anchor="middle" fill="${col}">${v}</text>`;
  const g=document.getElementById("gWord");g.textContent=wd;g.style.color=col;
  document.getElementById("gHint").textContent="Sleep, food, exercise, focus combined";
}

/* ============ overview chart (cross-module) ============ */
const OV_METRICS=[
 {mid:"__throttle",key:"throttle",label:"Daily throttle"},
 {mid:"sleep",key:"hours",label:"Sleep hours"},
 {mid:"sleep",key:"quality",label:"Sleep quality"},
 {mid:"mood",key:"energy",label:"Energy"},
 {mid:"fitness",key:"mins",label:"Exercise min",multi:true,agg:"sum"},
 {mid:"nutrition",key:"protein",label:"Protein g",multi:true,agg:"sum"},
 {mid:"nutrition",key:"water",label:"Water L",day:true},
 {mid:"study",key:"hours",label:"Study hours"},
 {mid:"research",key:"deep",label:"Research hours"},
 {mid:"finance",key:"amount",label:"Spend",multi:true,agg:"sum"},
];
function seriesFor(mt,dates){
  return dates.map(d=>{
    if(mt.mid==="__throttle")return{d,v:throttleForDate(d)};
    const md=DB.modules[mt.mid];let v=null;
    if(mt.day){v=md.dayEntries&&md.dayEntries[d]?num(md.dayEntries[d][mt.key]):null;}
    else if(mt.multi){const list=md.entries[d]||[];const vals=list.map(e=>num(e[mt.key])).filter(x=>x!==null);if(vals.length)v=vals.reduce((a,b)=>a+b,0);}
    else{const e=md.entries[d];v=e?num(e[mt.key]):null;}
    return{d,v};
  });
}
function svgLine(svgEl,statEl,pts){
  const W=320,H=150,pad=6,bottom=16;
  const vals=pts.map(p=>p.v).filter(v=>v!==null);
  if(!vals.length){svgEl.innerHTML=`<text x="160" y="75" fill="#9aa0ad" font-size="12" text-anchor="middle">No data in range</text>`;if(statEl)statEl.innerHTML="";return;}
  let mn=Math.min(...vals),mx=Math.max(...vals);if(mn===mx){mn=mn-1;mx=mx+1;}
  const plotW=W-pad*2,plotH=H-bottom-pad;
  const x=i=>pad+(pts.length===1?plotW/2:i/(pts.length-1)*plotW);
  const y=v=>pad+plotH-((v-mn)/(mx-mn))*plotH;
  let g="";for(let i=0;i<=2;i++){const yy=pad+plotH*i/2;g+=`<line x1="${pad}" y1="${yy}" x2="${W-pad}" y2="${yy}" stroke="#e6e8ec" stroke-width="1"/>`;}
  let dpath="",area="",started=false;
  pts.forEach((p,i)=>{if(p.v===null)return;const X=x(i),Y=y(p.v);if(!started){dpath=`M${X} ${Y}`;area=`M${X} ${pad+plotH} L${X} ${Y}`;started=true;}else{dpath+=` L${X} ${Y}`;area+=` L${X} ${Y}`;}});
  let lastX=pad+plotW;for(let i=pts.length-1;i>=0;i--){if(pts[i].v!==null){lastX=x(i);break;}}
  area+=` L${lastX} ${pad+plotH} Z`;
  let dots="";pts.forEach((p,i)=>{if(p.v===null)return;dots+=`<circle cx="${x(i)}" cy="${y(p.v)}" r="2.3" fill="#16a34a"/>`;});
  svgEl.innerHTML=`${g}
    <path d="${area}" fill="url(#ovgrad)" opacity="0.18"/>
    <defs><linearGradient id="ovgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#16a34a"/><stop offset="1" stop-color="#16a34a" stop-opacity="0"/></linearGradient></defs>
    <path d="${dpath}" fill="none" stroke="#16a34a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${pad}" y="${H-4}" fill="#9aa0ad" font-size="9">${fmtDate(pts[0].d)}</text>
    <text x="${W-pad}" y="${H-4}" fill="#9aa0ad" font-size="9" text-anchor="end">${fmtDate(pts[pts.length-1].d)}</text>`;
  if(statEl){const avg=vals.reduce((a,b)=>a+b,0)/vals.length;statEl.innerHTML=`<span>avg <b>${avg.toFixed(1)}</b></span><span>min <b>${mn.toFixed(1)}</b></span><span>max <b>${mx.toFixed(1)}</b></span><span>days <b>${vals.length}</b></span>`;}
}
window.drawOverview=function(){
  clearThr();
  const sel=document.getElementById("ovSel");if(!sel)return;
  const mt=OV_METRICS[+sel.value]||OV_METRICS[0];
  const days=globalDays();
  const pts=seriesFor(mt,datesInRange(days));
  svgLine(document.getElementById("ovSvg"),document.getElementById("ovStat"),pts);
};
function initOverviewSel(){const sel=document.getElementById("ovSel");sel.innerHTML=OV_METRICS.map((m,i)=>`<option value="${i}">${m.label}</option>`).join("");}

// offline: try register a tiny service worker via blob (best-effort; app works without it)
if("serviceWorker" in navigator){
  try{
    const swCode=`self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>self.clients.claim());self.addEventListener("fetch",e=>{e.respondWith(caches.open("ll").then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(e.request.method==="GET")c.put(e.request,res.clone());return res;}).catch(()=>caches.match("/")))));});`;
    const blob=new Blob([swCode],{type:"text/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }catch(e){}
}
