<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lifelog">
<meta name="theme-color" content="#0d2818">
<title>Lifelog</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230d2818'/%3E%3Ccircle cx='90' cy='108' r='30' fill='none' stroke='%234ade80' stroke-width='6'/%3E%3Cline x1='90' y1='108' x2='90' y2='86' stroke='%234ade80' stroke-width='6' stroke-linecap='round'/%3E%3Cline x1='90' y1='108' x2='106' y2='108' stroke='%23a3e635' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#ffffff; --surface:#ffffff; --surface2:#f5f6f8; --surface3:#eceef2;
    --text:#1a1d24; --muted:#616875; --faint:#9aa0ad;
    --accent:#16a34a; --accent-dim:#15803d; --leaf:#4d9a2a; --teal:#0f9d8c; --rose:#dc2626;
    --line:#e6e8ec; --line2:#d5d8de;
    --ok:#0f9d8c; --warn:#d97706; --bad:#dc2626;
    --r:12px; --r-sm:9px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.45;
    padding-bottom:env(safe-area-inset-bottom);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{margin:0;font-weight:650}
  button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:15px}
  .wrap{max-width:640px;margin:0 auto;padding:0 16px}
  .hidden{display:none!important}

  /* header */
  header{
    position:sticky;top:0;z-index:40;
    background:linear-gradient(180deg,rgba(230,247,235,.95),rgba(255,255,255,.92));
    backdrop-filter:blur(10px);
    padding:calc(env(safe-area-inset-top) + 14px) 0 10px;
    border-bottom:1px solid #d3ead9;
  }
  .hrow{display:flex;align-items:center;gap:12px}
  .brand{font-size:20px;font-weight:750;letter-spacing:-.02em;color:var(--accent-dim)}
  .brand .leaf{margin-right:6px;font-size:18px;filter:drop-shadow(0 1px 1px rgba(21,128,61,.25))}
  .brand .dot{color:var(--accent)}
  .htools{margin-left:auto;display:flex;gap:8px}
  .icb{
    height:34px;padding:0 14px;border-radius:8px;background:var(--surface2);
    display:grid;place-items:center;color:var(--muted);font-size:13px;font-weight:600;
    border:1px solid var(--line);
  }
  .icb:active{background:var(--surface3)}

  /* global range */
  .range-bar{margin-top:12px}
  .range-slider{width:100%;padding:0 8px}
  .range-slider input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:999px;
    background:var(--surface3);outline:none;margin:6px 0 0}
  .range-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;
    border-radius:50%;background:var(--accent);border:3px solid #fff;box-shadow:0 1px 4px rgba(21,128,61,.4);cursor:pointer}
  .range-slider input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;
    background:var(--accent);border:3px solid #fff;box-shadow:0 1px 4px rgba(21,128,61,.4);cursor:pointer}
  .range-slider input[type=range]:disabled{opacity:.4}
  .range-top{display:flex;align-items:center;gap:8px;margin-bottom:2px}
  .range-top .rlbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:700}
  .range-top #rangeVal{margin-left:auto;font-size:13px;font-weight:750;color:var(--accent-dim)}
  .allbtn{padding:4px 12px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);
    font-size:12px;font-weight:650;color:var(--muted)}
  .allbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* nutrition steppers */
  .meal-tabs{display:flex;gap:8px;margin-bottom:14px}
  .meal-tabs button{flex:1;padding:10px 4px;border-radius:var(--r-sm);background:var(--surface2);
    border:1px solid var(--line);font-weight:650;color:var(--muted);font-size:13px}
  .meal-tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .nut-grid{display:flex;flex-direction:column;gap:10px}
  .stepper{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--r-sm);padding:10px 12px}
  .stepper .nlab{font-size:14px;font-weight:650;line-height:1.2}
  .stepper .nlab small{display:block;font-size:11px;color:var(--faint);font-weight:600;margin-top:2px}
  .stepper .nctrl{margin-left:auto;display:flex;align-items:center;gap:8px}
  .stepper .stbtn{width:36px;height:36px;border-radius:9px;background:var(--surface2);border:1px solid var(--line2);
    font-size:20px;font-weight:700;color:var(--accent-dim);display:grid;place-items:center;line-height:1}
  .stepper .stbtn:active{background:var(--surface3)}
  .stepper .nval{min-width:58px;text-align:center;font-size:16px;font-weight:750}
  .stepper .nval small{font-size:11px;color:var(--muted);font-weight:600;margin-left:1px}
  .counter{display:inline-flex;align-items:center;gap:12px}
  .counter .cv{min-width:48px}
  .micro-head{display:flex;align-items:baseline;gap:8px;margin:16px 2px 8px;font-size:12px;
    text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:700}
  .micro-head span{margin-left:auto;text-transform:none;letter-spacing:0;font-weight:600;color:var(--faint)}
  .micro-wrap{display:flex;flex-wrap:wrap;gap:8px}
  .mchip{padding:7px 12px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);
    font-size:12px;font-weight:600;color:var(--muted)}
  .mchip.on{background:var(--leaf);color:#fff;border-color:var(--leaf)}
  .chip{
    flex:0 0 auto;padding:7px 14px;border-radius:999px;background:var(--surface2);
    color:var(--muted);font-size:13px;font-weight:600;border:1px solid var(--line);white-space:nowrap;
  }
  .chip.on{background:var(--accent);color:#ffffff;border-color:var(--accent)}

  main{padding:18px 0 90px}

  /* throttle gauge signature */
  .gauge-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 16px 12px;text-align:center}
  .gauge-card .gt{display:flex;align-items:baseline;text-align:left}
  .gauge-card .gt b{font-size:13px;font-weight:700;letter-spacing:.02em}
  .gauge-card .gt span{margin-left:auto;font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em}
  .gauge-svg{width:230px;max-width:80%;height:auto;display:block;margin:2px auto -6px}
  .g-num{font-size:34px;font-weight:800;letter-spacing:-.03em;line-height:1}
  .g-num small{font-size:15px;font-weight:700;color:var(--muted)}
  .g-word{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
  .g-hint{font-size:11px;color:var(--faint);margin-top:6px}

  .today-h{display:flex;align-items:baseline;gap:10px;margin:20px 2px 12px}
  .today-h h2{font-size:17px}
  .today-h .date{color:var(--muted);font-size:13px;margin-left:auto}

  /* module grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:14px;position:relative;overflow:hidden;text-align:left;width:100%;
    transition:transform .08s;
  }
  .card:active{transform:scale(.98)}
  .card .ic{font-size:20px;margin-bottom:8px;display:block}
  .card .nm{font-size:14px;font-weight:650}
  .card .st{font-size:12px;color:var(--muted);margin-top:3px;min-height:16px}
  .card .big{font-size:22px;font-weight:750;margin-top:6px;letter-spacing:-.02em}
  .card .big small{font-size:12px;color:var(--muted);font-weight:600}
  .card .streak{position:absolute;top:12px;right:12px;font-size:11px;color:var(--accent);font-weight:700}
  .card .accentbar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:.0}
  .card.done .accentbar{opacity:1}

  /* full-screen sheet */
  .sheet{
    position:fixed;inset:0;z-index:60;background:var(--bg);
    transform:translateY(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    overflow-y:auto;padding-bottom:40px;
  }
  .sheet.open{transform:translateY(0)}
  .sheet-h{
    position:sticky;top:0;background:var(--bg);z-index:5;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:12px;
  }
  .sheet-h .ttl{font-size:18px;font-weight:700}
  .sheet-h .ttl .ic{margin-right:6px}
  .close{margin-left:auto;width:36px;height:36px;border-radius:10px;background:var(--surface2);display:grid;place-items:center;font-size:16px;color:var(--muted)}
  .sec{margin:18px 16px}
  .sec-t{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);font-weight:700;margin:0 2px 10px}

  /* fields */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .field .unit{color:var(--faint);font-weight:500}
  .inp{
    width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--line2);
    border-radius:var(--r-sm);color:var(--text);outline:none;
  }
  .inp:focus{border-color:var(--accent)}
  textarea.inp{resize:vertical;min-height:60px}
  /* scale buttons */
  .scale{display:flex;gap:6px;flex-wrap:wrap}
  .scale button{
    flex:1;min-width:34px;padding:11px 0;background:var(--surface);border:1px solid var(--line2);
    border-radius:9px;color:var(--muted);font-weight:650;font-size:14px;
  }
  .scale button.on{background:var(--accent);color:#ffffff;border-color:var(--accent)}
  /* toggle */
  .tgl{display:flex;gap:8px}
  .tgl button{flex:1;padding:12px;background:var(--surface);border:1px solid var(--line2);border-radius:var(--r-sm);color:var(--muted);font-weight:650}
  .tgl button.on-y{background:var(--teal);color:#ffffff;border-color:var(--teal)}
  .tgl button.on-n{background:var(--surface3);color:var(--text);border-color:var(--line2)}

  .btn{
    display:block;width:100%;padding:14px;background:var(--accent);color:#ffffff;
    border-radius:var(--r-sm);font-weight:750;font-size:15px;text-align:center;
  }
  .btn:active{background:var(--accent-dim)}
  .btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line2)}
  .btn.mini{padding:10px;font-size:13px}
  .btn-row{display:flex;gap:10px}

  /* history rows */
  .row{
    display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);
    border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:8px;
  }
  .row .rd{font-size:12px;color:var(--muted);min-width:52px}
  .row .rv{flex:1;font-size:14px}
  .row .del{color:var(--faint);font-size:16px;padding:4px 8px}
  .empty{color:var(--faint);text-align:center;padding:24px;font-size:14px}

  /* chart */
  .chart-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 8px 8px}
  .chart-top{display:flex;align-items:center;gap:8px;padding:0 8px 10px}
  .metric-sel{margin-left:auto}
  select.mini-sel{background:var(--surface2);border:1px solid var(--line2);border-radius:8px;color:var(--text);padding:7px 10px;font-size:12px}
  svg.chart{display:block;width:100%;height:150px}
  .cstat{display:flex;gap:16px;padding:6px 10px 2px;font-size:12px;color:var(--muted)}
  .cstat b{color:var(--text);font-weight:700}

  /* range override in sheet */
  .rov{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:6px}
  .rov::-webkit-scrollbar{display:none}
  .rov .chip{padding:6px 12px;font-size:12px}

  /* add-param */
  .addparam{display:flex;gap:8px;margin-top:4px}
  .addparam .inp{flex:1}
  .param-tag{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--line2);border-radius:999px;padding:5px 10px;font-size:12px;margin:0 6px 6px 0;color:var(--muted)}
  .param-tag .x{color:var(--faint);font-weight:700}

  /* toast */
  .toast{
    position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:var(--surface3);color:var(--text);padding:11px 18px;border-radius:999px;font-size:13px;font-weight:600;
    border:1px solid var(--line2);opacity:0;transition:.25s;z-index:100;pointer-events:none;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* settings sheet list */
  .setrow{display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:8px}
  .setrow .si{font-size:18px}
  .setrow .sv{flex:1}
  .setrow .sv b{display:block;font-size:14px}
  .setrow .sv span{font-size:12px;color:var(--muted)}
  .weekly-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px}
  .wk-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .wk-line:last-child{border:none}
  .wk-line .v{font-weight:700}
  .install-note{background:var(--surface2);border:1px dashed var(--line2);border-radius:var(--r);padding:14px;font-size:13px;color:var(--muted);line-height:1.5}
  .install-note b{color:var(--text)}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="hrow">
      <div class="brand"><span class="leaf">🌿</span>Lifelog</div>
      <div class="htools">
        <button class="icb" onclick="openWeekly()">Review</button>
        <button class="icb" onclick="openSettings()">Settings</button>
      </div>
    </div>
    <div class="range-bar" id="rangeBar"></div>
  </div>
</header>

<main class="wrap">
  <div class="gauge-card">
    <div class="gt"><b>Today's throttle</b><span id="gaugeDate"></span></div>
    <svg class="gauge-svg" id="gaugeSvg" viewBox="0 0 200 118"></svg>
    <div class="g-word" id="gWord">No data</div>
    <div class="g-hint" id="gHint">Log today to see your throttle</div>
  </div>

  <div class="today-h">
    <h2>Today</h2>
    <span class="date" id="todayDate"></span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="today-h" style="margin-top:26px">
    <h2>Overview</h2>
    <span class="date">all metrics</span>
  </div>
  <div class="chart-wrap" id="ovWrap">
    <div class="chart-top">
      <span style="font-size:12px;color:var(--muted)">metric</span>
      <div class="metric-sel"><select class="mini-sel" id="ovSel" onchange="drawOverview()"></select></div>
    </div>
    <svg class="chart" id="ovSvg" viewBox="0 0 320 150" preserveAspectRatio="none"></svg>
    <div class="cstat" id="ovStat"></div>
  </div>
</main>

<!-- module sheet -->
<div class="sheet" id="sheet">
  <div class="sheet-h">
    <div class="ttl" id="sheetTtl"></div>
    <button class="close" onclick="closeSheet()">✕</button>
  </div>
  <div id="sheetBody"></div>
</div>

<!-- settings sheet -->
<div class="sheet" id="setSheet">
  <div class="sheet-h">
    <div class="ttl">Settings & Data</div>
    <button class="close" onclick="closeSet()">✕</button>
  </div>
  <div id="setBody"></div>
</div>

<!-- weekly sheet -->
<div class="sheet" id="wkSheet">
  <div class="sheet-h">
    <div class="ttl">Weekly review</div>
    <button class="close" onclick="closeWeekly()">✕</button>
  </div>
  <div id="wkBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============ storage ============ */
const KEY="lifelog.v1";
const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
function load(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function save(){try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){toast("Save failed — storage full?");}}

/* ============ module definitions ============
   type: number | scale(1-10) | time | bool | text | select
   multi:true  => list of timestamped entries per day (meals, workouts...)
   else single record per date
=================================================*/
const RANGES=[{k:"7d",n:"7d",d:7},{k:"14d",n:"14d",d:14},{k:"30d",n:"30d",d:30},{k:"90d",n:"90d",d:90},{k:"365d",n:"1y",d:365},{k:"all",n:"All",d:99999}];

// nutrition: meal slots + nutrient steppers (daily reference for adult male)
const MEAL_SLOTS=["Breakfast","Lunch","Dinner"];
const NUTRIENTS=[
  {key:"kcal",label:"Calories",unit:"kcal",step:50,goal:2500},
  {key:"protein",label:"Protein",unit:"g",step:5,goal:56},
  {key:"carbs",label:"Carbs",unit:"g",step:10,goal:300},
  {key:"fat",label:"Fat",unit:"g",step:5,goal:78},
  {key:"fiber",label:"Fiber",unit:"g",step:2,goal:38},
];
// micronutrients — just toggle if the meal had a source (hard to quantify)
const MICROS=[
  // vitamins
  "Vit A","Vit B1","Vit B2","Vit B3","Vit B5","Vit B6","Vit B7","Vit B9 (Folate)","Vit B12",
  "Vit C","Vit D","Vit E","Vit K",
  // minerals
  "Calcium","Phosphorus","Magnesium","Potassium","Sodium","Chloride",
  "Iron","Zinc","Copper","Manganese","Iodine","Selenium","Molybdenum","Chromium","Fluoride","Cobalt",
  // fats
  "Omega-3"
];

const MODULES=[
 {id:"sleep",name:"Sleep",ic:"🌙",multi:false,fields:[
   {key:"bed",label:"Slept at",type:"time"},
   {key:"wake",label:"Woke at",type:"time"},
   {key:"hours",label:"Hours slept",type:"number",unit:"h",chart:true},
   {key:"quality",label:"Quality",type:"scale",chart:true},
   {key:"sun",label:"Morning sunlight",type:"bool"},
   {key:"naps",label:"Nap minutes",type:"number",unit:"min",chart:true},
 ]},
 {id:"nutrition",name:"Nutrition",ic:"🍽️",multi:true,fields:[
   {key:"slot",label:"Meal",type:"select",options:["Breakfast","Lunch","Dinner"]},
   {key:"kcal",label:"Calories",type:"number",unit:"kcal",chart:true},
   {key:"protein",label:"Protein",type:"number",unit:"g",chart:true},
   {key:"carbs",label:"Carbs",type:"number",unit:"g",chart:true},
   {key:"fat",label:"Fat",type:"number",unit:"g",chart:true},
   {key:"fiber",label:"Fiber",type:"number",unit:"g",chart:true},
 ],dayField:{key:"water",label:"Water today",type:"number",unit:"L",chart:true}},
 {id:"fitness",name:"Fitness",ic:"💪",multi:true,fields:[
   {key:"type",label:"Type",type:"select",options:["Gym","Run","Walk","Home","Yoga","Sport","Rest"]},
   {key:"mins",label:"Duration",type:"number",unit:"min",chart:true},
   {key:"note",label:"Note",type:"text"},
 ],dayField:{key:"weight",label:"Body weight",type:"number",unit:"kg",chart:true}},
 {id:"research",name:"Research",ic:"🔬",multi:false,fields:[
   {key:"deep",label:"Deep-work hours",type:"number",unit:"h",chart:true},
   {key:"plan",label:"Plan (today)",type:"text"},
   {key:"progress",label:"Progress",type:"text"},
   {key:"problem",label:"Problems",type:"text"},
   {key:"papers",label:"Papers read",type:"number",chart:true},
 ]},
 {id:"study",name:"Study",ic:"📚",multi:false,fields:[
   {key:"topic",label:"Topic",type:"text"},
   {key:"hours",label:"Hours",type:"number",unit:"h",chart:true},
   {key:"roadmap",label:"Roadmap % (agentic AI)",type:"number",unit:"%",chart:true},
   {key:"win",label:"Concept mastered",type:"text"},
 ]},
 {id:"reading",name:"Reading",ic:"📖",multi:true,fields:[
   {key:"book",label:"Book",type:"text"},
   {key:"pages",label:"Pages",type:"number",chart:true},
   {key:"mins",label:"Minutes",type:"number",unit:"min",chart:true},
   {key:"idea",label:"Key idea",type:"text"},
 ]},
 {id:"tutoring",name:"Tutoring",ic:"🧑‍🏫",multi:true,fields:[
   {key:"student",label:"Student",type:"text"},
   {key:"topic",label:"Topic",type:"text"},
   {key:"mins",label:"Duration",type:"number",unit:"min",chart:true},
   {key:"income",label:"Income",type:"number",unit:"₹",chart:true},
 ]},
 {id:"mood",name:"Mood & Energy",ic:"⚡",multi:false,fields:[
   {key:"energy",label:"Energy now",type:"scale",chart:true},
   {key:"mood",label:"Mood",type:"scale",chart:true},
   {key:"focus",label:"Focus quality",type:"scale",chart:true},

function moduleSummary(m){
  const t=todayStr();const md=DB.modules[m.id];
  if(m.multi){
    const list=(md.entries[t]||[]);
    let done=list.length>0;let big="",st="";
    if(m.id==="fitness"){const mins=list.reduce((a,e)=>a+(+e.mins||0),0);big=mins?mins+'<small> min</small>':"";st=list.length?list.length+" session"+(list.length>1?"s":""):"tap to log";}
    else if(m.id==="nutrition"){big=list.length?list.length+'<small> meals</small>':"";const w=(md.dayEntries&&md.dayEntries[t]&&md.dayEntries[t].water)||0;st=w?w+" L water":"tap to log";}
    else if(m.id==="reading"){const p=list.reduce((a,e)=>a+(+e.pages||0),0);big=p?p+'<small> pg</small>':"";st=list.length?list.length+" session"+(list.length>1?"s":""):"tap to log";}
    else if(m.id==="tutoring"){big=list.length?list.length+'<small> class</small>':"";st=list.length?"logged":"tap to log";}
    else if(m.id==="finance"){const s=list.reduce((a,e)=>a+(+e.amount||0),0);big=s?'₹'+s:"";st=list.length?list.length+" items":"tap to log";}
    else if(m.id==="circadian"){big=list.length?list.length+'<small>×</small>':"";st=list.length?"readings":"tap to log";}
    else if(m.id==="leetcode"){const s=list.reduce((a,e)=>a+(+e.solved||0),0);big=s?s+'<small> solved</small>':"";st=list.length?list.length+" set"+(list.length>1?"s":""):"tap to log";}
    else if(m.id==="contacts"){big=list.length?list.length+'<small> new</small>':"";st=list.length?"contacts":"tap to log";}
    return{done,big,st};
  }else{
    const e=md.entries[t];let done=!!e;let big="",st="tap to log";
    if(m.id==="sleep"){if(e){big=(e.hours||"?")+'<small> h</small>';st="Q "+(e.quality||"–")+"/10";}}
    else if(m.id==="research"){if(e){big=(e.deep||0)+'<small> h</small>';st=e.progress?trim(e.progress):"deep work";}}
    else if(m.id==="study"){if(e){big=(e.hours||0)+'<small> h</small>';st=e.topic?trim(e.topic):"studied";}}
    else if(m.id==="mood"){if(e){big=(e.energy||"–")+'<small>/10</small>';st="energy";}}
    else if(m.id==="habits"){if(e){const c=["wake","meditate","noscreen","sunlight"].filter(k=>e[k]).length;big=c+'<small>/4</small>';st="done today";done=true;}}
    else if(m.id==="code"){if(e){big=(e.commits||0)+'<small> commits</small>';st=e.committed?"pushed ✓":(e.what?trim(e.what):"logged");}}
    else if(m.id==="kaggle"){if(e){big=e.done?"✓":"—";st=e.note?trim(e.note):(e.done?"worked":"skipped");}}
    else if(m.id==="linux"){if(e){big=e.done?"✓":"—";st=e.topic?trim(e.topic):(e.done?"studied":"skipped");}}
    else if(m.id==="gate"){if(e){big=e.done?"✓":"—";st=e.subject?trim(e.subject):(e.done?"studied":"skipped");}}
    else if(m.id==="coursera"){if(e){big=e.done?"✓":"—";st=e.course?trim(e.course):(e.done?"progressed":"skipped");}}
    return{done,big,st};
  }
}
function trim(s){return s.length>22?s.slice(0,22)+"…":s;}
function streakOf(m){
  // count consecutive days (back from today) with any entry
  let n=0;const md=DB.modules[m.id];const d=new Date();
  for(let i=0;i<400;i++){const t=new Date(d);t.setDate(d.getDate()-i);const s=t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");
    const e=md.entries[s];const has=m.multi?(e&&e.length):!!e;
    if(has)n++;else if(i>0)break;else break;}
  return n;
}

function fieldInput(f,val){
  const id="f_"+f.key;
  if(f.type==="scale"){
    let h=`<div class="scale" data-key="${f.key}">`;
    for(let i=1;i<=10;i++)h+=`<button type="button" onclick="pickScale(this,'${f.key}',${i})" class="${val==i?"on":""}">${i}</button>`;
    return h+`</div>`;
  }
  if(f.type==="bool"){
    return `<div class="tgl" data-key="${f.key}">
      <button type="button" onclick="pickBool(this,'${f.key}',true)" class="${val===true?"on-y":""}">Yes</button>
      <button type="button" onclick="pickBool(this,'${f.key}',false)" class="${val===false?"on-n":""}">No</button></div>`;
  }
  if(f.type==="select"){
    let h=`<select class="inp" id="${id}">`;h+=`<option value="">–</option>`;
    f.options.forEach(o=>h+=`<option ${val===o?"selected":""}>${o}</option>`);return h+`</select>`;
  }
  if(f.type==="time")return `<input class="inp" id="${id}" type="time" value="${val||""}">`;
  if(f.type==="number")return `<input class="inp" id="${id}" type="number" inputmode="decimal" step="any" value="${val??""}">`;
  if(f.type==="counter"){const step=f.step||1;const v=+val||0;
    return `<div class="counter" data-key="${f.key}" data-val="${v}" data-step="${step}">
      <button type="button" class="stbtn" onclick="stepField(this,-1)">–</button>
      <div class="cv nval">${v}</div>
      <button type="button" class="stbtn" onclick="stepField(this,1)">+</button></div>`;}
  if(f.type==="text")return `<input class="inp" id="${id}" type="text" value="${val?String(val).replace(/"/g,"&quot;"):""}">`;
  return "";
}
window.stepField=(btn,dir)=>{const c=btn.parentElement;const step=+c.dataset.step||1;let v=(+c.dataset.val||0)+dir*step;if(v<0)v=0;v=+v.toFixed(2);c.dataset.val=v;c.querySelector(".cv").textContent=v;};
window.pickScale=(el,k,v)=>{el.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("on"));el.classList.add("on");el.parentElement.dataset.val=v;};
window.pickBool=(el,k,v)=>{const p=el.parentElement;p.querySelectorAll("button").forEach(b=>{b.classList.remove("on-y","on-n");});el.classList.add(v?"on-y":"on-n");p.dataset.val=v?"1":"0";};

function readForm(m){
  const obj={};
  allFields(m).forEach(f=>{
    if(f.type==="scale"){const c=document.querySelector(`.scale[data-key="${f.key}"]`);if(c&&c.dataset.val)obj[f.key]=+c.dataset.val;}
    else if(f.type==="bool"){const c=document.querySelector(`.tgl[data-key="${f.key}"]`);if(c&&c.dataset.val!==undefined)obj[f.key]=c.dataset.val==="1";}
    else if(f.type==="counter"){const c=document.querySelector(`.counter[data-key="${f.key}"]`);if(c&&+c.dataset.val>0)obj[f.key]=+c.dataset.val;}
    else{const el=document.getElementById("f_"+f.key);if(el&&el.value!=="")obj[f.key]=f.type==="number"?+el.value:el.value;}
  });
  return obj;
}

window.drawChart=function(){
  const m=MOD[CUR];if(!m)return;const sel=document.getElementById("metricSel");if(!sel)return;
  const key=sel.value;const isDay=sel.selectedOptions[0].dataset.day==="1";
  const md=DB.modules[m.id];const days=rangeDays(m.id);const dates=datesInRange(days);
  const pts=dates.map(d=>{
    let v=null;
    if(isDay){v=md.dayEntries&&md.dayEntries[d]?md.dayEntries[d][key]:null;}
    else if(m.multi){const list=md.entries[d]||[];
      const valid=list.map(e=>e[key]).filter(x=>x!==undefined&&x!==""&&!isNaN(+x)).map(Number);
      if(valid.length)v=valid.reduce((a,b)=>a+b,0);/*sum per day*/}
    else{const e=md.entries[d];v=e&&e[key]!==undefined&&e[key]!==""?+e[key]:null;}
    return{d,v:(v===null||isNaN(v))?null:v};
  });
  const svg=document.getElementById("chartSvg");const W=320,H=150,pad=6,bottom=16;
  const vals=pts.map(p=>p.v).filter(v=>v!==null);
  if(!vals.length){svg.innerHTML=`<text x="160" y="75" fill="#9aa0ad" font-size="12" text-anchor="middle">No data in range</text>`;document.getElementById("cstat").innerHTML="";return;}
  let mn=Math.min(...vals),mx=Math.max(...vals);if(mn===mx){mn=mn-1;mx=mx+1;}
  const plotW=W-pad*2,plotH=H-bottom-pad;
  const x=i=>pad+(pts.length===1?plotW/2:i/(pts.length-1)*plotW);
  const y=v=>pad+plotH-((v-mn)/(mx-mn))*plotH;
  // gridlines
  let g="";for(let i=0;i<=2;i++){const yy=pad+plotH*i/2;g+=`<line x1="${pad}" y1="${yy}" x2="${W-pad}" y2="${yy}" stroke="#e6e8ec" stroke-width="1"/>`;}
  // line path through non-null
  let dpath="",started=false,area="";
  pts.forEach((p,i)=>{if(p.v===null)return;const X=x(i),Y=y(p.v);if(!started){dpath=`M${X} ${Y}`;area=`M${X} ${pad+plotH} L${X} ${Y}`;started=true;}else{dpath+=` L${X} ${Y}`;area+=` L${X} ${Y}`;}});
  // close area
  let lastX=pad+plotW;for(let i=pts.length-1;i>=0;i--){if(pts[i].v!==null){lastX=x(i);break;}}
  area+=` L${lastX} ${pad+plotH} Z`;
  // dots
  let dots="";pts.forEach((p,i)=>{if(p.v===null)return;dots+=`<circle cx="${x(i)}" cy="${y(p.v)}" r="2.5" fill="#16a34a"/>`;});
  svg.innerHTML=`${g}
    <path d="${area}" fill="url(#grad)" opacity="0.25"/>
    <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#16a34a"/><stop offset="1" stop-color="#16a34a" stop-opacity="0"/></linearGradient></defs>
    <path d="${dpath}" fill="none" stroke="#16a34a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${pad}" y="${H-4}" fill="#9aa0ad" font-size="9">${fmtDate(pts[0].d)}</text>
    <text x="${W-pad}" y="${H-4}" fill="#9aa0ad" font-size="9" text-anchor="end">${fmtDate(pts[pts.length-1].d)}</text>`;
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  document.getElementById("cstat").innerHTML=`<span>avg <b>${avg.toFixed(1)}</b></span><span>min <b>${mn.toFixed(1)}</b></span><span>max <b>${mx.toFixed(1)}</b></span><span>days <b>${vals.length}</b></span>`;
};

/* ============ daily throttle score ============ */
function num(v){return (v===undefined||v===null||v==="")?null:(isNaN(+v)?null:+v);}
function clamp01(x){return x<0?0:x>1?1:x;}
function throttleForDate(d){
  const M=DB.modules;const parts=[];
  // sleep: hours near 7.5 ideal + quality + timing (bed before 1am)
  const s=M.sleep.entries[d];
  if(s){let sc=0,w=0;
    if(num(s.hours)!==null){const h=+s.hours;sc+=clamp01(1-Math.abs(h-7.5)/4);w++;}
    if(num(s.quality)!==null){sc+=(+s.quality)/10;w++;}
    if(s.bed){const hh=+s.bed.split(":")[0];const bedGood=(hh>=21||hh<=1)?1:(hh<=3?0.3:0);sc+=bedGood;w++;}
    if(w)parts.push([sc/w,1.4]);
  }
  // exercise
  const fx=M.fitness.entries[d]||[];const mins=fx.reduce((a,e)=>a+(num(e.mins)||0),0);
  if(fx.length)parts.push([clamp01(mins/40),1.2]);
  // nutrition: meals + protein
  const nu=M.nutrition.entries[d]||[];const meals=nu.length;const prot=nu.reduce((a,e)=>a+(num(e.protein)||0),0);
  if(nu.length)parts.push([clamp01(meals/3)*0.5+clamp01(prot/60)*0.5,1.2]);
  // study + research hours (only count if logged; logged 0h counts as 0)
  const st=M.study.entries[d],re=M.research.entries[d];
  if(st||re){const hrs=(st&&num(st.hours)||0)+(re&&num(re.deep)||0);
    parts.push([clamp01(hrs/6),1.2]);}
  // habits
  const hb=M.habits.entries[d];if(hb){const c=["wake","meditate","noscreen","sunlight"].filter(k=>hb[k]).length;parts.push([c/4,1]);}
  // energy
  const mo=M.mood.entries[d];if(mo&&num(mo.energy)!==null)parts.push([(+mo.energy)/10,1]);
  // water
  const wa=M.nutrition.dayEntries&&M.nutrition.dayEntries[d]?num(M.nutrition.dayEntries[d].water):null;
  if(wa!==null)parts.push([clamp01(wa/3),0.6]);
  const anyReal=s||fx.length||nu.length||st||re||hb||mo||wa!==null;
  if(!anyReal)return null;
  let sw=0,tw=0;parts.forEach(([v,w])=>{sw+=v*w;tw+=w;});
  return Math.round(clamp01(sw/tw)*100);
}
function throttleWord(v){
  if(v<35)return["Idle","#dc2626"];       // red
  if(v<65)return["Cruising","#d97706"];    // amber
  return["Strong","#16a34a"];              // green
}
function gaugePt(a,rad){const r=a*Math.PI/180;return [100+rad*Math.cos(r),100-rad*Math.sin(r)];}
function renderGauge(){
  const v=throttleForDate(todayStr());
  const svg=document.getElementById("gaugeSvg");
  document.getElementById("gaugeDate").textContent=new Date().toLocaleDateString(undefined,{day:"numeric",month:"short"});
  const R=82;
  // track
  let track="";for(let a=180;a>=0;a-=3){const[x,y]=gaugePt(a,R);track+=(a===180?"M":"L")+x.toFixed(1)+" "+y.toFixed(1)+" ";}
  if(v===null){
    svg.innerHTML=`<path d="${track}" fill="none" stroke="#e6e8ec" stroke-width="12" stroke-linecap="round"/>
      <text x="100" y="96" font-size="26" font-weight="800" text-anchor="middle" fill="#9aa0ad">–</text>`;
    document.getElementById("gWord").textContent="No data";document.getElementById("gWord").style.color="var(--faint)";
    document.getElementById("gHint").textContent="Log today to see your throttle";return;
  }
  const aVal=180*(1-v/100);
  let val="";for(let a=180;a>=aVal;a-=3){const[x,y]=gaugePt(a,R);val+=(val===""?"M":"L")+x.toFixed(1)+" "+y.toFixed(1)+" ";}
  const[wd,col]=throttleWord(v);
  const[nx,ny]=gaugePt(aVal,R-6);
  svg.innerHTML=`<path d="${track}" fill="none" stroke="#eceef2" stroke-width="12" stroke-linecap="round"/>
    <path d="${val}" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="${col}" stroke-width="3" stroke-linecap="round"/>
    <circle cx="100" cy="100" r="5" fill="${col}"/>
    <text x="24" y="114" font-size="9" fill="#9aa0ad">0</text>
    <text x="176" y="114" font-size="9" fill="#9aa0ad" text-anchor="end">100</text>
    <text x="100" y="82" font-size="32" font-weight="800" text-anchor="middle" fill="${col}">${v}</text>`;
  const g=document.getElementById("gWord");g.textContent=wd;g.style.color=col;
  document.getElementById("gHint").textContent="Sleep, food, exercise, focus combined";
}

function seedDummy(){
  const M=DB.modules;
  for(let i=0;i<30;i++){
    const d=dateBack(i);const r=rnd(i);
    // sleep: after 3am, wake 10am, ok hours bad timing, low quality
    if(!M.sleep.entries[d])M.sleep.entries[d]={bed:"03:"+String(10+Math.floor(r*40)).padStart(2,"0"),wake:"10:"+String(5+Math.floor(rnd(i+1)*25)).padStart(2,"0"),hours:+(6.6+r*0.8).toFixed(1),quality:3+Math.floor(rnd(i+2)*3),sun:false,naps:0,_dummy:true};
    // nutrition: no breakfast, light lunch + dinner, low protein
    if(!M.nutrition.entries[d]){M.nutrition.entries[d]=[
      {slot:"Lunch",meal:"Lunch",kcal:400,protein:8,carbs:60,fat:10,fiber:5,_id:i*10+1,_time:"13:30",_dummy:true},
      {slot:"Dinner",meal:"Dinner",kcal:450,protein:9,carbs:65,fat:12,fiber:6,_id:i*10+2,_time:"21:30",_dummy:true}];}
    M.nutrition.dayEntries=M.nutrition.dayEntries||{};
    if(!M.nutrition.dayEntries[d])M.nutrition.dayEntries[d]={water:+(1.25+rnd(i+3)*1).toFixed(2),_dummy:true};
    // fitness: none, weight flat ~68
    M.fitness.dayEntries=M.fitness.dayEntries||{};
    if(!M.fitness.dayEntries[d])M.fitness.dayEntries[d]={weight:+(68+ (rnd(i+4)-0.5)*0.6).toFixed(1),_dummy:true};
    // mood: low energy
    if(!M.mood.entries[d])M.mood.entries[d]={energy:3+Math.floor(rnd(i+5)*3),mood:4+Math.floor(rnd(i+6)*2),focus:3+Math.floor(rnd(i+7)*2),_dummy:true};
    // habits: mostly missed
    if(!M.habits.entries[d])M.habits.entries[d]={wake:false,meditate:false,noscreen:false,sunlight:false,_dummy:true};
    // research/study: sparse low
    if(rnd(i+8)>0.6&&!M.research.entries[d])M.research.entries[d]={deep:+(rnd(i+9)*1.5).toFixed(1),progress:"read a bit",_dummy:true};
    if(rnd(i+10)>0.65&&!M.study.entries[d])M.study.entries[d]={topic:"misc",hours:+(rnd(i+11)*1.2).toFixed(1),_dummy:true};
  }
  DB.settings.dummy=true;DB.settings._seeded=true;save();
}
function clearDummy(){
  MODULES.forEach(m=>{const md=DB.modules[m.id];
    Object.keys(md.entries).forEach(d=>{
      const e=md.entries[d];
      if(Array.isArray(e)){md.entries[d]=e.filter(x=>!x._dummy);if(!md.entries[d].length)delete md.entries[d];}
      else if(e&&e._dummy){delete md.entries[d];}
    });
    if(md.dayEntries)Object.keys(md.dayEntries).forEach(d=>{if(md.dayEntries[d]&&md.dayEntries[d]._dummy)delete md.dayEntries[d];});
  });
  DB.settings.dummy=false;DB.settings._seeded=true;save();
}
window.toggleDummy=function(){
  if(DB.settings.dummy){clearDummy();toast("Sample data off");}
  else{seedDummy();toast("Sample data on");}
  buildSettings();renderGrid();initOverviewSel();drawOverview();
};

/* ============ boot ============ */
if(DB.settings.dummy&&!DB.settings._seeded)seedDummy();
initOverviewSel();
renderRangeBar();renderGrid();
setInterval(renderGauge,60000);
// close sheets on back gesture-ish: escape
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeSheet();closeSet();closeWeekly();}});
// offline: try register a tiny service worker via blob (best-effort; app works without it)
if("serviceWorker" in navigator){
  try{
    const swCode=`self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>self.clients.claim());self.addEventListener("fetch",e=>{e.respondWith(caches.open("ll").then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(e.request.method==="GET")c.put(e.request,res.clone());return res;}).catch(()=>caches.match("/")))));});`;
    const blob=new Blob([swCode],{type:"text/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }catch(e){}
}
</script>
